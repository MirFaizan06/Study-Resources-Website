<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Default SEO (overridden per-page via useHead hook) -->
    <title>NotesHub Kashmir - Free Study Materials for Kashmir University Students</title>
    <meta
      name="description"
      content="Download free notes, past papers, syllabi, and AI-powered guess papers for Kashmir University, Cluster University, and more. Empowering Kashmir's students."
    />
    <meta name="keywords" content="Kashmir University notes, KU past papers, PYQ Kashmir, study materials Kashmir, BCA notes Kashmir, B.Tech notes Kashmir, Cluster University notes" />
    <meta name="author" content="Hachi wa Studios" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://noteshubkashmir.in/" />
    <meta property="og:title" content="NotesHub Kashmir - Free Academic Resources" />
    <meta property="og:description" content="Download free notes, past papers, syllabi and AI-powered guess papers for Kashmir universities." />
    <meta property="og:image" content="/images/og-home.png" />
    <meta property="og:site_name" content="NotesHub Kashmir" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NotesHub Kashmir - Free Study Materials" />
    <meta name="twitter:description" content="Free notes, past papers, and syllabi for Kashmir University students." />
    <meta name="twitter:image" content="/images/og-home.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NotesHub Kashmir" />

    <!-- Canonical -->
    <link rel="canonical" href="https://noteshubkashmir.in/" />

    <!-- Google Analytics 4 — replace G-XXXXXXXXXX with your Measurement ID -->
    <!-- Uncomment when you have a GA4 property set up -->
    <!--
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    -->

    <!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXXXX with your Publisher ID -->
    <!-- Uncomment when you have a real AdSense account approved -->
    <!--
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
         crossorigin="anonymous"></script>
    -->

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "NotesHub Kashmir",
        "description": "Free educational resources for Kashmiri university students",
        "url": "https://noteshubkashmir.in"
      }
    </script>

    <!-- Inline theme script: prevent FOUC on page load -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('theme')
          var preferred = stored
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light'
          document.documentElement.setAttribute('data-theme', preferred)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
