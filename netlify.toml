[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

# ─── Proxy API calls through Netlify CDN ─────────────────────────────────────
# Replace YOUR_APP_URL with your Railway app URL
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_APP_URL.railway.app/api/:splat"
  status = 200
  force  = true

# ─── SPA fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Immutable asset cache (Vite content-hashes all filenames) ────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Hero images — cache 24 hours ─────────────────────────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ─── Favicon / icons ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── HTML — never cache (always fresh for SPA routing) ────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
